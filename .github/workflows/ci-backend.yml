name: Build and save my Docker image to a registry

on:
  push:
    branches:
      - main
    paths:
      - "src/backend/**"     

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}  
  IMAGE_NAME: "backend-app"                  

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Verify env and secrets
        run: |
          echo "REGISTRY=$REGISTRY"
          echo "IMAGE_NAME=$IMAGE_NAME"

      - name: Log in to Azure Container Registry
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          if [ -z "$REGISTRY" ] || [ -z "$ACR_USERNAME" ] || [ -z "$ACR_PASSWORD" ]; then
            echo "Missing registry or credentials - check repository secrets" >&2
            exit 1
          fi
          echo "$ACR_PASSWORD" | docker login "$REGISTRY" -u "$ACR_USERNAME" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" ./backend

      - name: Push Docker image
        run: |
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"